name: Python Setup Benchmark

on:
  workflow_dispatch:

env:
  BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}

jobs:
  python-actions-cache:
    name: "Baseline: actions/setup-python + actions/cache"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        run: [1, 2, 3]
    steps:
      - name: Create requirements.txt
        run: |
          mkdir -p test-project
          cat > test-project/requirements.txt << 'EOF'
          requests==2.32.3
          flask==3.1.0
          pandas==2.2.3
          numpy==2.2.1
          pydantic==2.10.4
          httpx==0.28.1
          EOF

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-benchmark-${{ runner.os }}-${{ hashFiles('test-project/requirements.txt') }}
          restore-keys: pip-benchmark-${{ runner.os }}-

      - name: Pip install
        run: |
          cd test-project
          START_TIME=$(date +%s%N)
          pip install -r requirements.txt -q
          END_TIME=$(date +%s%N)
          DURATION=$(( (END_TIME - START_TIME) / 1000000 ))
          echo "actions/setup-python pip install - Run ${{ matrix.run }}: ${DURATION}ms"
          mkdir -p benchmark-results
          echo "${DURATION}" > benchmark-results/actions-cache-run${{ matrix.run }}.txt

      - uses: actions/upload-artifact@v4
        with:
          name: actions-cache-results-${{ matrix.run }}
          path: test-project/benchmark-results/

  python-boringcache:
    name: "Test: boringcache/python"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        run: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4

      - name: Create requirements.txt
        run: |
          mkdir -p test-project
          cat > test-project/requirements.txt << 'EOF'
          requests==2.32.3
          flask==3.1.0
          pandas==2.2.3
          numpy==2.2.1
          pydantic==2.10.4
          httpx==0.28.1
          EOF

      - name: Setup Python with boringcache
        uses: ./
        with:
          workspace: boringcache/actions
          python-version: '3.12'

      - name: Pip install
        run: |
          cd test-project
          START_TIME=$(date +%s%N)
          pip install -r requirements.txt -q
          END_TIME=$(date +%s%N)
          DURATION=$(( (END_TIME - START_TIME) / 1000000 ))
          echo "boringcache/python pip install - Run ${{ matrix.run }}: ${DURATION}ms"
          mkdir -p benchmark-results
          echo "${DURATION}" > benchmark-results/boringcache-run${{ matrix.run }}.txt

      - uses: actions/upload-artifact@v4
        with:
          name: boringcache-results-${{ matrix.run }}
          path: test-project/benchmark-results/

  benchmark-summary:
    name: Generate Summary
    runs-on: ubuntu-latest
    needs: [python-actions-cache, python-boringcache]
    if: always()
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "*-results-*"
          merge-multiple: true

      - name: Generate summary
        run: |
          echo "# Python Setup Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## pip install Times" >> $GITHUB_STEP_SUMMARY
          echo "| Run | actions/setup-python + actions/cache | boringcache/python | Improvement |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------------------------------------|-------------------|-------------|" >> $GITHUB_STEP_SUMMARY

          for run in 1 2 3; do
            if [[ -f "actions-cache-run${run}.txt" && -f "boringcache-run${run}.txt" ]]; then
              a=$(cat "actions-cache-run${run}.txt")
              b=$(cat "boringcache-run${run}.txt")
              if [[ $b -gt 0 ]]; then
                imp=$(echo "scale=2; $a / $b" | bc -l)
              else
                imp="N/A"
              fi
              echo "| $run | ${a}ms | ${b}ms | ${imp}x |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $run | Missing | Missing | N/A |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Summary" >> $GITHUB_STEP_SUMMARY

          if [[ -f actions-cache-run1.txt && -f actions-cache-run2.txt && -f actions-cache-run3.txt && \
                -f boringcache-run1.txt && -f boringcache-run2.txt && -f boringcache-run3.txt ]]; then
            aa=$(( ($(cat actions-cache-run1.txt)+$(cat actions-cache-run2.txt)+$(cat actions-cache-run3.txt))/3 ))
            bb=$(( ($(cat boringcache-run1.txt)+$(cat boringcache-run2.txt)+$(cat boringcache-run3.txt))/3 ))
            if [[ $bb -gt 0 ]]; then
              imp=$(echo "scale=2; $aa / $bb" | bc -l)
            else
              imp="N/A"
            fi
            echo "- **actions/setup-python + actions/cache average**: ${aa}ms" >> $GITHUB_STEP_SUMMARY
            echo "- **boringcache/python average**: ${bb}ms" >> $GITHUB_STEP_SUMMARY
            echo "- **Improvement**: ${imp}x" >> $GITHUB_STEP_SUMMARY
          fi
